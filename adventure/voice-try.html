<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>金錢冒險・角色語音試聽</title>
<style>
  body { margin:0; font-family:"Microsoft JhengHei","Noto Sans TC",sans-serif;
    background:linear-gradient(160deg,#fff7ed,#fef3c7); color:#3a2a12; padding:20px 14px; }
  .wrap { max-width:560px; margin:0 auto; }
  h1 { font-size:1.3rem; text-align:center; color:#92400e; margin:0 0 3px; }
  .lead { text-align:center; font-size:0.85rem; color:#a16207; margin:0 0 16px; }
  .card { background:#fff; border:2px solid #fcd34d; border-radius:14px; padding:12px 14px; margin-bottom:10px; }
  .card h3 { margin:0 0 3px; font-size:1rem; }
  .card .vname { font-size:0.78rem; color:#0d9488; word-break:break-all; }
  .card .vname.miss { color:#dc2626; }
  .card .say { font-size:0.82rem; color:#78350f; margin:6px 0 8px; }
  button.play { background:linear-gradient(135deg,#ea580c,#d97706); color:#fff; border:none;
    border-radius:10px; padding:9px 16px; font-size:0.95rem; font-weight:700; cursor:pointer; }
  button.play:active { filter:brightness(0.92); }
  .banner { border-radius:12px; padding:11px 13px; font-size:0.84rem; line-height:1.6; margin-bottom:14px; }
  .banner.ok { background:#d1fae5; border:1.5px solid #34d399; color:#065f46; }
  .banner.warn { background:#fef3c7; border:1.5px solid #fbbf24; color:#92400e; }
  details { margin-top:16px; font-size:0.8rem; color:#78350f; }
  details pre { background:#fff7ed; border:1px solid #fcd34d; border-radius:8px; padding:8px; overflow-x:auto; white-space:pre-wrap; word-break:break-all; }
</style></head><body>
<div class="wrap">
  <h1>🎧 一日金錢冒險・角色語音試聽</h1>
  <p class="lead">請用 <b>Microsoft Edge</b> 開啟並保持<b>連網</b>，才會有那批 Online (Natural) 神經語音</p>
  <div id="banner" class="banner warn">偵測中…</div>
  <div id="cards"></div>

  <details><summary>🔍 這台裝置所有的中文語音（點開看）</summary><pre id="voicelist">讀取中…</pre></details>
</div>

<script>
// —— 與 adventure.js AdvSpeech 同一套設定 ——
const VOICE_PREFS = {
  narrator: ['Xiaoxiao','晓晓','Yunjian','云健','HsiaoChen','曉臻','晓臻'],
  boy:      ['Yunxi','云希','Yunyang','云扬','YunJhe','雲哲','云哲'],
  teen:     ['YunJhe','雲哲','云哲','Yunjian','云健','Yunxi','云希'],
  girl:     ['HsiaoChen','曉臻','晓臻','Xiaoyi','晓伊','Xiaoxiao','晓晓'],
  kid:      ['HsiaoYu','曉雨','晓雨','Xiaoyi','晓伊','HsiaoChen','晓臻'],
};
const PROFILES = {
  narrator:{pitch:1.0,rate:0.9}, boy:{pitch:0.95,rate:1.0}, teen:{pitch:0.8,rate:1.0},
  girl:{pitch:1.3,rate:1.05}, kid:{pitch:1.15,rate:0.95},
};
const SPEAKERS = [
  { who:'narrator', emoji:'🎙️', name:'旁白', say:'今天媽媽給了你 120 元零用錢，先數數看有多少吧！' },
  { who:'boy',  emoji:'👦', name:'小翔（活潑少年）', say:'答對了！共有 120 元！我最喜歡冒險了！' },
  { who:'teen', emoji:'🧑', name:'小凱（成熟大男孩）', say:'太棒了！我選了牛肉麵，共花 65 元！' },
  { who:'girl', emoji:'👧', name:'小花（清亮女生）', say:'答對了！鉛筆在便利商店只要 8 元，最便宜！' },
  { who:'kid',  emoji:'🧒', name:'小芮（細心稍高）', say:'每天存 20 元，15 天就能存到 300 元！' },
];

let voices = [];
function voiceFor(who){
  for(const kw of (VOICE_PREFS[who]||[])){ const v = voices.find(x=>x.name.includes(kw)); if(v) return v; }
  return voices.find(v=>v.name.startsWith('Microsoft Yating')) ||
         voices.find(v=>v.lang && v.lang.startsWith('zh')) || null;
}
function speak(sp){
  const u = new SpeechSynthesisUtterance(sp.say);
  const v = voiceFor(sp.who); const p = PROFILES[sp.who];
  if(v) u.voice = v; u.lang = v?.lang||'zh-TW'; u.rate = p.rate; u.pitch = p.pitch;
  speechSynthesis.cancel(); speechSynthesis.speak(u);
}
function render(){
  voices = speechSynthesis.getVoices();
  const zh = voices.filter(v=>v.lang && v.lang.toLowerCase().startsWith('zh'));
  const online = zh.filter(v=>/online|natural/i.test(v.name));
  const b = document.getElementById('banner');
  if(online.length){ b.className='banner ok'; b.innerHTML = `✅ 偵測到 <b>${online.length}</b> 把 Online (Natural) 神經語音 — 四角色會是真的不同人聲！`; }
  else if(zh.length){ b.className='banner warn'; b.innerHTML = `⚠️ 只找到 ${zh.length} 把本地中文語音、沒有 Online (Natural)。<br>可能不是 Edge 或未連網 — 此時四角色改用「同一把語音變音高/語速」來區分。`; }
  else { b.className='banner warn'; b.textContent = '⚠️ 這台裝置沒有中文語音。'; }

  document.getElementById('cards').innerHTML = SPEAKERS.map((sp,i)=>{
    const v = voiceFor(sp.who);
    return `<div class="card"><h3>${sp.emoji} ${sp.name}</h3>
      <div class="vname ${v?'':'miss'}">🔈 ${v? v.name : '（找不到，會用後備語音＋變調）'}</div>
      <div class="say">「${sp.say}」</div>
      <button class="play" data-i="${i}">▶ 試聽</button></div>`;
  }).join('');
  document.querySelectorAll('.play').forEach(btn=>btn.addEventListener('click',()=>speak(SPEAKERS[btn.dataset.i])));

  document.getElementById('voicelist').textContent =
    zh.length ? zh.map(v=>`${v.name}  [${v.lang}]${/online|natural/i.test(v.name)?'  ★online':''}`).join('\n')
              : '（無）';
}
render();
if(window.speechSynthesis) speechSynthesis.addEventListener('voiceschanged', render);
setTimeout(render, 400);  // 部分瀏覽器 voices 稍後才載入
</script>
</body></html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27><text y=%27.9em%27 font-size=%2790%27>💰</text></svg>">
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生優良行為計分</title>
    <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
    <div class="container">
        <div class="title-row">
            <div style="flex-grow:1; display:flex; align-items:center; justify-content:center; gap:10px;">
                <img id="rewardDetective" src="../images/common/hint_detective.png" alt="小金探" title="點我，聽小金探說話" style="height:70px; width:auto; object-fit:contain; cursor:pointer; animation:settingsBounce 2.5s ease-in-out infinite;">
                <style>@keyframes settingsBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }</style>
                <button id="rewardDetectiveSpeaker" title="播放小金探語音" aria-label="播放小金探語音" style="background:none; border:none; cursor:pointer; font-size:1.6rem; line-height:1; padding:4px; flex-shrink:0;">🔊</button>
                <h1 style="margin:0; flex-grow:0;">學生優良行為計分</h1>
            </div>
            <div class="zoom-controls">
                <button id="zoomOutBtn" class="zoom-btn" title="縮小視窗">−</button>
                <button id="zoomInBtn" class="zoom-btn" title="放大視窗">+</button>
            </div>
        </div>

        <!-- 區塊一：新增資料 -->
        <div class="section-block">
            <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; align-items: center;">
                <select id="studentSelectDropdown" style="height: 36px; border-radius: 6px; border: 1px solid #ccc; padding: 4px 10px; font-size: 14px; cursor: pointer; max-width: 160px;">
                    <option value="">── 選擇學生 ──</option>
                </select>
                <button id="studentDeleteBtn" title="永久刪除選取的學生" style="height: 36px; padding: 0 10px; border-radius: 6px; border: 1px solid #dc3545; background: #fff; color: #dc3545; font-size: 16px; cursor: pointer;">🗑️</button>
                <button id="addStudentBtn" class="upload-btn" style="background-color: #28a745;">➕ 新增學生</button>
                <input type="file" id="iconUploadInput" accept="image/*" style="display: none;">
                <label for="iconUploadInput" class="upload-btn" style="background-color: #17a2b8;">🖼️ 新增加分圖示</label>
                <input type="file" id="soundUploadInput" accept="audio/*" style="display: none;">
                <label for="soundUploadInput" class="upload-btn" style="background-color: #17a2b8;" title="建議 100KB 以內的短音效（3秒以內最佳），最大限制 300KB｜僅可上傳 1 個自訂音效">🔊 新增加分音效</label>
            </div>
        </div>

        <!-- 區塊二：加分圖示與音效 -->
        <div class="section-block">
            <div style="display: flex; gap: 40px; justify-content: center; align-items: center; flex-wrap: wrap;">
                <!-- 左側：加分圖示 -->
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div class="select-wrapper" style="display: flex; align-items: center; gap: 8px;">
                        <label for="bonusIconSelect">加分圖示:</label>
                        <select id="bonusIconSelect">
                            <option value="⭐">⭐ 星星</option>
                            <option value="🌟">🌟 閃亮星星</option>
                            <option value="🏆">🏆 獎杯</option>
                            <option value="🎖️">🎖️ 榮譽勳章</option>
                            <option value="🏅">🏅 獎牌</option>
                            <option value="💎">💎 鑽石</option>
                            <option value="👍">👍 讚</option>
                            <option value="🎯">🎯 達標</option>
                            <option value="🌈">🌈 彩虹</option>
                            <option value="🎁">🎁 禮物</option>
                        </select>
                        <button id="iconDeleteBtn" title="刪除選取的自訂圖示" style="height: 30px; padding: 0 8px; border-radius: 6px; border: 1px solid #dc3545; background: #fff; color: #dc3545; font-size: 14px; cursor: pointer;">🗑️</button>
                    </div>
                    <div class="bonus-icon-preview-container">
                        <img id="bonusIconPreview" src="" alt="加分圖示預覽" class="bonus-icon-preview">
                    </div>
                </div>

                <!-- 右側：加分音效 -->
                <div class="select-wrapper" style="display: flex; align-items: center; gap: 8px;">
                    <label for="bonusSoundSelect">加分音效:</label>
                    <select id="bonusSoundSelect">
                        <option value="sound/bouns01.mp3">音效 1</option>
                        <option value="sound/bouns02.mp3">音效 2</option>
                        <option value="sound/bouns03.mp3">音效 3</option>
                    </select>
                    <button id="previewSoundBtn" class="preview-sound-btn" title="預聽音效">▶</button>
                    <button id="soundDeleteBtn" title="刪除選取的自訂音效" style="height: 30px; padding: 0 8px; border-radius: 6px; border: 1px solid #dc3545; background: #fff; color: #dc3545; font-size: 14px; cursor: pointer;">🗑️</button>
                </div>
            </div>
        </div>

        <!-- 區塊三：分數設定 -->
        <div class="section-block">
            <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
                <button id="rankButton" class="upload-btn">分數排名</button>
                <button id="resetButton" class="upload-btn reset-btn">重設分數</button>
                <button id="clearAllButton" class="upload-btn clear-all-btn">清除所有資料</button>
            </div>
        </div>

        <p class="upload-hint">提示：學生資料會自動儲存，關閉網頁後再開啟仍可保留。所有照片僅讀取至瀏覽器暫存，不會上傳至任何外部伺服器。</p>

        <div id="studentsContainer" class="students-container">
            </div>

    </div>
    <!-- ── 學生成長頁（徽章・寶石・寵物・寶物）────────────── -->
    <style>
        #growth-overlay {
            display: none; position: fixed; inset: 0; z-index: 9000;
            background: linear-gradient(160deg, #fef9ec, #fdf2d0);
            overflow-y: auto; padding: 18px;
        }
        #growth-overlay.open { display: block; }
        .gp-card { max-width: 640px; margin: 0 auto; background: #fff; border: 2px solid #f5d576;
                   border-radius: 20px; padding: 20px 22px 26px; box-shadow: 0 10px 36px rgba(217,119,6,0.18); position: relative; }
        .gp-close { position: absolute; top: 12px; right: 14px; background: none; border: none;
                    font-size: 1.4em; cursor: pointer; color: #92400e; }
        .gp-head { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
        .gp-head img.gp-photo { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; border: 3px solid #f0b429; }
        .gp-head .gp-name { font-size: 1.3em; font-weight: 900; color: #92400e; }
        .gp-currency { display: flex; gap: 10px; margin: 10px 0 14px; flex-wrap: wrap; }
        .gp-cur { flex: 1; min-width: 120px; text-align: center; background: #fffbeb; border: 1.5px solid #f5d576;
                  border-radius: 14px; padding: 10px; }
        .gp-cur b { display: block; font-size: 1.6em; color: #b45309; }
        .gp-cur span { font-size: 0.8em; color: #92400e; font-weight: 700; }
        .gp-sec-title { font-weight: 900; color: #92400e; margin: 16px 0 8px; font-size: 1em; }

        /* 寵物區 */
        .gp-pet { text-align: center; background: linear-gradient(180deg, #fff, #fef6df);
                  border: 2px dashed #f0b429; border-radius: 18px; padding: 14px 12px 16px; }
        .gp-pet img { width: min(52vw, 220px); max-height: 220px; object-fit: contain;
                      filter: drop-shadow(0 10px 18px rgba(217,119,6,0.3)); animation: gpPetBob 3s ease-in-out infinite; }
        @keyframes gpPetBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .gp-pet-name { font-weight: 900; color: #b45309; font-size: 1.1em; margin-top: 4px; }
        .gp-bar-wrap { background: #f1f5f9; border-radius: 12px; height: 16px; margin: 10px 18px; overflow: hidden; }
        .gp-bar { height: 100%; background: linear-gradient(90deg, #f7c948, #de911d); border-radius: 12px;
                  transition: width 0.5s ease; }
        .gp-bar-label { font-size: 0.78em; color: #92400e; }
        .gp-pet-btns { display: flex; gap: 10px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
        .gp-btn { border: none; cursor: pointer; font-family: inherit; font-weight: 800;
                  padding: 10px 20px; border-radius: 22px; font-size: 0.92em; }
        .gp-btn:disabled { opacity: 0.45; cursor: not-allowed; }
        .gp-feed { background: linear-gradient(135deg, #86efac, #16a34a); color: #fff; }
        .gp-evolve { background: linear-gradient(135deg, #c4b5fd, #7c3aed); color: #fff; }
        .gp-msg { text-align: center; font-size: 0.82em; color: #b45309; min-height: 1.4em; margin-top: 8px; font-weight: 700; }

        /* 徽章／寶物 */
        .gp-badges, .gp-treasures { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .gp-chip { width: 90px; text-align: center; padding: 10px 4px 8px; border: 1.5px solid #eadfc0;
                   border-radius: 12px; background: #fffdf5; }
        .gp-chip .ic { font-size: 1.6em; }
        .gp-chip .nm { font-size: 0.66em; font-weight: 700; color: #6b4e0f; margin-top: 3px; line-height: 1.3; }
        .gp-chip.locked { filter: grayscale(1); opacity: 0.4; }
        .gp-chip .buy { margin-top: 5px; font-size: 0.7em; border: none; background: #f0b429; color: #4a2b00;
                        font-weight: 800; border-radius: 10px; padding: 3px 10px; cursor: pointer; font-family: inherit; }
        .gp-chip .buy:disabled { opacity: 0.4; cursor: not-allowed; }

        /* 任務狀態（唯讀） */
        .gp-quests { font-size: 0.85em; }
        .gp-quest-line { display: flex; align-items: center; gap: 8px; padding: 6px 10px;
                         border-bottom: 1px dashed #eadfc0; }
        .gp-quest-line:last-child { border-bottom: none; }
        @media print { #growth-overlay { position: static; } }
    </style>

    <div id="growth-overlay">
        <div class="gp-card">
            <button class="gp-close" onclick="closeGrowthPage()" title="回計分板">✕</button>
            <div class="gp-head">
                <img class="gp-photo" id="gp-photo" src="" alt="學生照片">
                <div>
                    <div class="gp-name" id="gp-name"></div>
                    <div style="font-size:0.8em;color:#b45309;">🌱 我的成長頁</div>
                </div>
            </div>
            <div class="gp-currency">
                <div class="gp-cur"><b id="gp-coins">0</b><span>🪙 金幣</span></div>
                <div class="gp-cur"><b id="gp-gems">0</b><span>💎 寶石（無錯通過獲得）</span></div>
                <div class="gp-cur"><b id="gp-practices">0</b><span>📚 練習次數</span></div>
            </div>

            <div class="gp-sec-title">🐷 我的存錢寵物</div>
            <div class="gp-pet">
                <img id="gp-pet-img" src="" alt="寵物">
                <div class="gp-pet-name" id="gp-pet-name"></div>
                <div class="gp-bar-wrap"><div class="gp-bar" id="gp-bar" style="width:0%"></div></div>
                <div class="gp-bar-label" id="gp-bar-label"></div>
                <div class="gp-pet-btns">
                    <button class="gp-btn gp-feed" id="gp-feed-btn">🍎 餵食（花 5 金幣）</button>
                    <button class="gp-btn gp-evolve" id="gp-evolve-btn" hidden>✨ 進化（花 3 寶石）</button>
                </div>
                <div class="gp-msg" id="gp-msg"></div>
            </div>

            <div class="gp-sec-title">🏅 徽章牆</div>
            <div class="gp-badges" id="gp-badges"></div>

            <div class="gp-sec-title">🎁 寶物櫃（用寶石兌換）</div>
            <div class="gp-treasures" id="gp-treasures"></div>

            <div class="gp-sec-title">🚀 今日任務（到主頁金隊長領獎）</div>
            <div class="gp-quests" id="gp-quests"></div>
        </div>
    </div>

    <script src="../js/growth-system.js"></script>
    <script src="../js/emoji-library.js"></script>
    <script src="script.js?v=2"></script>
    <!-- 點擊小金探播放語音（預錄音檔 → 瀏覽器 TTS 後備）──────────── -->
    <script>
    (function () {
        const AUDIO_BASE = '../audio/chatbot/';
        const FILE = 'reward_detective_greeting';
        const TTS  = '偵探小金探來報到！這裡是優良行為計分表，我們一起來看看每位同學最近的好表現。表現很棒的地方，繼續保持，大家一起加油！';
        let _a = null, _tok = null;
        function stop() {
            _tok = null;
            if (_a) { try { _a.pause(); } catch (e) {} _a = null; }
            if (window.speechSynthesis) speechSynthesis.cancel();
        }
        function ttsFallback() {
            if (!window.speechSynthesis) return;
            speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(TTS);
            u.lang = 'zh-TW'; u.rate = 0.95;
            const vs = speechSynthesis.getVoices();
            u.voice = vs.find(v => /yating/i.test(v.name)) ||
                      vs.find(v => /microsoft/i.test(v.name) && /online/i.test(v.name) && v.lang.startsWith('zh')) ||
                      vs.find(v => v.lang === 'zh-TW') || null;
            speechSynthesis.speak(u);
        }
        function play() {
            stop();
            const exts = ['mp3', 'wav']; let i = 0; const t = {}; _tok = t;
            const next = () => {
                if (_tok !== t) return;
                if (i >= exts.length) { ttsFallback(); return; }
                const a = new Audio(AUDIO_BASE + FILE + '.' + exts[i++]);
                _a = a;
                let adv = false;
                const fail = () => { if (adv) return; adv = true; next(); };
                a.onerror = fail;
                a.onended = () => { if (_tok === t) _a = null; };
                a.play().catch(fail);
            };
            next();
        }
        const img = document.getElementById('rewardDetective');
        if (img) img.addEventListener('click', play);
        const spk = document.getElementById('rewardDetectiveSpeaker');
        if (spk) spk.addEventListener('click', play);
    })();
    </script>
</body>
</html>

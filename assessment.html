<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27><text y=%27.9em%27 font-size=%2790%27>💰</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>能力快篩｜金錢小達人</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #f0f7ff; color: #334e68; min-height: 100vh;
               font-family: 'Helvetica Neue', Arial, 'Microsoft JhengHei', sans-serif; }
        .wrap { max-width: 640px; margin: 0 auto; padding: 24px 16px 50px; }
        header { text-align: center; margin-bottom: 14px; }
        header img { width: 84px; }
        h1 { font-size: 1.4em; color: #b45309; margin: 6px 0 2px; }
        .sub { font-size: 0.85em; color: #64748b; }
        .dots { display: flex; gap: 6px; justify-content: center; margin: 14px 0; flex-wrap: wrap; }
        .dots span { width: 12px; height: 12px; border-radius: 50%; background: #dbe7f5; }
        .dots span.done { background: #16a34a; }
        .dots span.cur  { background: #f59e0b; transform: scale(1.25); }
        .card { background: #fff; border: 2px solid #dbe7f5; border-radius: 18px; padding: 26px 22px;
                box-shadow: 0 6px 24px rgba(0,0,0,0.07); text-align: center; }
        .q-skill { font-size: 0.75em; color: #94a3b8; font-weight: 700; letter-spacing: 1px; }
        .q-text { font-size: 1.3em; font-weight: 800; margin: 10px 0 4px; display: flex; align-items: center;
                  justify-content: center; gap: 8px; flex-wrap: wrap; }
        .q-visual { font-size: 2em; margin: 12px 0; line-height: 1.6; letter-spacing: 4px; }
        .opts { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-top: 18px; }
        .opt { min-width: 110px; padding: 18px 20px; border-radius: 16px; border: 2.5px solid #dbe7f5;
               background: #f8fbff; font-size: 1.35em; font-weight: 800; cursor: pointer;
               font-family: inherit; color: #334e68; transition: transform 0.12s, border-color 0.12s; }
        .opt:hover { border-color: #f59e0b; transform: translateY(-3px); }
        .coin { display: inline-flex; align-items: center; justify-content: center; width: 46px; height: 46px;
                border-radius: 50%; background: radial-gradient(circle at 35% 30%, #fde68a, #d9a406);
                color: #6b4300; font-weight: 900; font-size: 0.55em; border: 2px solid #b8860b; margin: 2px; }
        .speak-btn { background: none; border: 1.5px solid #dbe7f5; border-radius: 20px; cursor: pointer;
                     font-size: 0.7em; padding: 4px 10px; font-family: inherit; }
        /* 結果頁 */
        .result-icon { font-size: 3em; }
        .rec-box { background: #fff7e0; border: 2px solid #f5d576; border-radius: 14px; padding: 16px;
                   margin: 16px 0; font-size: 1.05em; line-height: 1.8; }
        .rec-box b { color: #b45309; font-size: 1.2em; }
        .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 14px; }
        .btn { text-decoration: none; border: none; cursor: pointer; font-family: inherit; font-weight: 800;
               padding: 12px 24px; border-radius: 26px; font-size: 1em; display: inline-block; }
        .btn-main { background: linear-gradient(135deg, #f7c948, #de911d); color: #4a2b00; }
        .btn-sub  { background: #eaf3ff; color: #1d4ed8; }
        .detail-table { width: 100%; border-collapse: collapse; font-size: 0.82em; margin-top: 14px; }
        .detail-table td { border-top: 1px solid #e2e8f0; padding: 6px 8px; text-align: left; }
        /* 能力側寫 */
        .skill-map { margin: 14px 0 4px; text-align: left; }
        .sm-group { font-size: 0.8em; font-weight: 800; color: #64748b; margin: 12px 0 6px; }
        .sm-row { display: flex; gap: 6px; flex-wrap: wrap; }
        .seg { flex: 1 1 auto; min-width: 90px; padding: 8px 9px; border-radius: 10px; font-size: 0.78em;
               font-weight: 700; display: flex; align-items: center; justify-content: space-between; gap: 6px;
               border: 2px solid transparent; }
        .seg.ok { background: #dcfce7; color: #166534; }
        .seg.no { background: #fee2e2; color: #991b1b; }
        .seg.rec { border-color: #f59e0b; box-shadow: 0 0 0 3px #fde68a; background: #fff7e0; color: #b45309; }
        .pass-note { font-size: 0.9em; color: #166534; margin: 6px 0 2px; }
        .phase-badge { display: inline-block; background: #eaf3ff; color: #1d4ed8; font-size: 0.72em;
                       font-weight: 800; padding: 3px 12px; border-radius: 20px; margin-top: 6px; }
        .opt:focus-visible, .speak-btn:focus-visible { outline: 3px solid #f59e0b; outline-offset: 2px; }
    </style>
</head>
<body>
<div class="wrap">
    <header>
        <img src="images/common/captain_gold.png" alt="金隊長">
        <h1>🧭 金隊長能力快篩</h1>
        <div class="sub" id="subTitle">12 題小挑戰，金隊長幫你找到最適合的起點！</div>
        <div id="phaseBadge"></div>
    </header>
    <div class="dots" id="dots"></div>
    <div class="card" id="card" aria-live="polite" role="group" aria-label="測驗題目"></div>
</div>

<script src="js/learning-tracker.js"></script>
<script>
// 題目階梯：由基礎往進階，答錯即為「建議起點」候選（取最早失誤的技能）
const coin = (v) => `<span class="coin">${v}</span>`;
// 隨機小工具
const R = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
const pick = a => a[R(0, a.length - 1)];
const shuffle = a => { a = a.slice(); for (let i = a.length - 1; i > 0; i--) { const j = R(0, i); [a[i], a[j]] = [a[j], a[i]]; } return a; };
const CN = ['零', '一', '二', '三', '四', '五', '六', '七', '八', '九'];
// 選項洗牌：傳入正解與誘答（值），回傳 {opts, ans}；render 可把值轉成硬幣等 HTML
function mc(correct, distractors, render) {
    render = render || (x => String(x));
    const s = shuffle([{ v: correct, a: true }, ...distractors.map(v => ({ v, a: false }))]);
    return { opts: s.map(x => render(x.v)), ans: s.findIndex(x => x.a) };
}

// 前測／後測模式（?phase=pre|post）：每技能 2 題（共 24 題）＋鎖難度帶（gen 收 pp 旗標收窄隨機範圍），
// 兩題全對才算通過該技能——控制猜對雜訊與施測間難度變異，供前後測成效佐證；無參數＝原 12 題快篩
const PHASE = new URLSearchParams(location.search).get('phase');
const PHASE_LABEL = PHASE === 'pre' ? '前測' : PHASE === 'post' ? '後測' : '';
const PP = !!PHASE_LABEL;

// 每個技能一支 gen()：每次施測隨機生成、契合該單元實際內容
const ITEMS = [
    { unit: 'f1', skill: '一對一對應', page: 'f1_object_correspondence', gen: (pp) => {
        const n = pp ? R(3, 5) : R(2, 5), f = pick(['🍎', '🍓', '🍊']), dot = k => '● '.repeat(k).trim();
        return { text: '哪一邊的點點，和上面的水果一樣多？', visual: f.repeat(n), ...mc(dot(n), [dot(n >= 5 ? n - 1 : n + 1)]) };
    } },
    { unit: 'f2', skill: '數量點數', page: 'f2_rote_and_rational_counting', gen: (pp) => {
        const n = pp ? R(4, 6) : R(3, 6), c = pick(['🍬', '🍭', '🍪']);
        return { text: '數數看，總共有幾顆？', visual: c.repeat(n), ...mc(n, [n - 1, n + 1]) };
    } },
    { unit: 'f3', skill: '數字認讀', page: 'f3_number_recognition', gen: () => {
        const t = R(1, 9), others = shuffle([1, 2, 3, 4, 5, 6, 7, 8, 9].filter(x => x !== t)).slice(0, 2);
        return { text: `請選出數字「${CN[t]}」`, visual: '', ...mc(t, others) };
    } },
    { unit: 'f4', skill: '數字排序', page: 'f4_number_sorting', gen: () => {
        const a = R(1, 6);
        return { text: '哪一排是從小到大的正確順序？', visual: '', ...mc(`${a} → ${a + 1} → ${a + 2}`, [`${a} → ${a + 2} → ${a + 1}`]) };
    } },
    { unit: 'f5', skill: '數量比較', page: 'f5_quantity_comparison', gen: (pp) => {
        const c = pick(['🍩', '🍇', '⭐']), m = pp ? R(4, 6) : R(3, 6), k = pp ? m - 2 : R(1, m - 1);
        return { text: '哪一邊比較多？', visual: '', ...mc(c.repeat(m), [c.repeat(k)]) };
    } },
    { unit: 'f6', skill: '數的合成', page: 'f6_number_composition', gen: (pp) => {
        const a = pp ? R(2, 4) : R(1, 5), b = pp ? R(2, 4) : R(1, 5), s = a + b;
        return { text: `${a} 和 ${b} 合起來是多少？`, visual: `${'●'.repeat(a)} ＋ ${'●'.repeat(b)}`, ...mc(s, [s - 1, s + 1]) };
    } },
    { unit: 'c1', skill: '認識錢幣', page: 'c1_money_types', gen: () => {
        const d = [1, 5, 10, 50], t = pick(d), others = shuffle(d.filter(x => x !== t)).slice(0, 2);
        return { text: `哪一個是 ${t} 元硬幣？`, visual: '', ...mc(t, others, coin) };
    } },
    { unit: 'c2', skill: '點數金額', page: 'c2_money_counting', gen: (pp) => {
        const cs = Array.from({ length: pp ? 3 : R(2, 3) }, () => pick([1, 5, 10])), s = cs.reduce((x, y) => x + y, 0);
        return { text: '這些錢合起來是多少元？', visual: cs.map(coin).join(''), ...mc(s, [s + 5, Math.max(1, s - 5)]) };
    } },
    { unit: 'c3', skill: '面額兌換', page: 'c3_money_exchange', gen: () => {
        const [big, small, n] = pick([[10, 5, 2], [50, 10, 5], [5, 1, 5], [10, 1, 10]]);
        return { text: `一個 ${big} 元，可以換幾個 ${small} 元？`, visual: coin(big) + ' → ？', ...mc(`${n} 個`, [`${n + 1} 個`, `${Math.max(1, n - 1)} 個`]) };
    } },
    { unit: 'c4', skill: '拿出正確金額', page: 'c4_correct_amount', gen: () => {
        const v = pick([
            { p: 30, ok: [10, 10, 10], bad: [[10, 5], [5, 5]] },
            { p: 20, ok: [10, 10], bad: [[10, 5], [5, 1]] },
            { p: 15, ok: [10, 5], bad: [[10, 10], [5, 5]] },
            { p: 25, ok: [10, 10, 5], bad: [[10, 5], [10, 10]] },
        ]);
        const render = arr => arr.map(coin).join('');
        return { text: `餅乾 ${v.p} 元，要拿哪些錢剛剛好？`, visual: `🍪 ${v.p} 元`, ...mc(v.ok, v.bad, render) };
    } },
    { unit: 'c5', skill: '夠不夠買', page: 'c5_sufficient_payment', gen: () => {
        const p = pick([15, 20, 25, 30, 35]), have = p + pick([-10, -5, 5, 10]), ok = have >= p;
        return { text: `你有 ${have} 元，東西賣 ${p} 元，錢夠嗎？`, visual: `🛒 ${p} 元｜👛 ${have} 元`, ...mc(ok ? '夠' : '不夠', [ok ? '不夠' : '夠']) };
    } },
    { unit: 'c6', skill: '找零', page: 'c6_making_change', gen: () => {
        const p = pick([20, 30, 40, 60, 70, 80]), paid = p <= 50 ? 50 : 100, ch = paid - p;
        return { text: `拿 ${paid} 元買 ${p} 元的東西，要找回多少元？`, visual: `🧃 ${p} 元｜💵 ${paid} 元`, ...mc(ch, [ch + 10, Math.max(0, ch - 10)]) };
    } },
];
// 施測時實例化：快篩＝每技能 1 題；前後測＝每技能 2 題（同技能兩題內容不重複）；「再測一次」reload 會重新生成
function buildQuiz() {
    const perSkill = PP ? 2 : 1;
    const quiz = [];
    for (const d of ITEMS) {
        const seen = new Set();
        for (let k = 0; k < perSkill; k++) {
            let q, sig, tries = 0;
            do {
                q = d.gen(PP);
                sig = q.text + '|' + q.visual + '|' + q.opts.slice().sort().join(',');
            } while (seen.has(sig) && ++tries < 15);
            seen.add(sig);
            quiz.push({ unit: d.unit, skill: d.skill, page: d.page, ...q });
        }
    }
    return quiz;
}
const QUIZ = buildQuiz();
const UNIT_NAMES = {
    f1:'F1 數量與物品的對應', f2:'F2 數量與點數', f3:'F3 認識數字與數量', f4:'F4 數字排序',
    f5:'F5 數量大小的比較', f6:'F6 數的合成與分解', c1:'C1 金錢的種類與面額', c2:'C2 金錢的點數與加總',
    c3:'C3 金錢面額的兌換', c4:'C4 正確的金額', c5:'C5 足額付款', c6:'C6 找零與計算',
};

let idx = 0;
const answers = [];   // { unit, ok }
const startTs = Date.now();

if (PP) {
    document.getElementById('phaseBadge').innerHTML = `<span class="phase-badge">📅 ${PHASE_LABEL}模式</span>`;
    document.getElementById('subTitle').textContent =
        `${PHASE_LABEL}：每項技能 2 題、共 ${QUIZ.length} 題，兩題都答對才算穩定通過`;
}

// 挑選最高品質的中文語音：優先神經語音（Edge 的 Natural／Online，如曉臻/雅婷）
let bestVoice = null, voicesReady = false, pendingText = null;
function pickVoice() {
    let vs = [];
    try { vs = speechSynthesis.getVoices(); } catch (e) { return; }
    if (!vs.length) return;                 // 語音清單尚未載入（非同步）→ 等 voiceschanged
    voicesReady = true;
    const zh = vs.filter(v => /zh[-_]?(TW|Hant|Hans|CN)|zh$/i.test(v.lang) || /chinese|中文|國語|普通話/i.test(v.name));
    const pool = zh.length ? zh : vs;
    const score = v => {
        let s = 0;
        if (/natural|online|neural/i.test(v.name)) s += 100;                 // 神經語音（音質最佳）
        if (/yating|雅婷|hsiaochen|曉臻|hsiaoyu|曉雨|yunjhe|雲哲/i.test(v.name)) s += 40;
        if (/microsoft|google/i.test(v.name)) s += 10;
        if (/TW|Taiwan|臺灣|台灣|Hant/i.test(v.lang + ' ' + v.name)) s += 25; // 台灣國語優先
        if (v.localService === false) s += 15;                              // 線上語音多為神經、音質較佳
        return s;
    };
    bestVoice = pool.slice().sort((a, b) => score(b) - score(a))[0] || null;
    if (pendingText != null) { const t = pendingText; pendingText = null; doSpeak(t); }  // 語音就緒 → 補念第一題
}
try { speechSynthesis.onvoiceschanged = pickVoice; } catch (e) {}
pickVoice();
// 後備：若 voiceschanged 遲未觸發，1.2 秒後以現有語音念出待播文字（總比不念好）
setTimeout(() => { if (pendingText != null) { pickVoice(); const t = pendingText; pendingText = null; voicesReady = true; doSpeak(t); } }, 1200);

function doSpeak(text) {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-TW'; u.rate = 0.92; u.pitch = 1.0;
    if (bestVoice) u.voice = bestVoice;
    speechSynthesis.speak(u);
}
function speak(text) {
    try {
        speechSynthesis.cancel();
        if (!voicesReady) pickVoice();
        if (!voicesReady) { pendingText = text; return; }  // 神經語音還沒載好 → 排隊，載好再念
        doSpeak(text);
    } catch (e) {}
}

function renderDots() {
    document.getElementById('dots').innerHTML = QUIZ.map((_, i) =>
        `<span class="${i < idx ? 'done' : i === idx ? 'cur' : ''}"></span>`).join('');
}

function renderItem() {
    renderDots();
    const it = QUIZ[idx];
    const card = document.getElementById('card');
    card.innerHTML = `
        <div class="q-skill">第 ${idx + 1} / ${QUIZ.length} 題｜${it.skill}</div>
        <div class="q-text">${it.text} <button class="speak-btn" aria-label="朗讀題目" onclick="speak('${it.text.replace(/'/g, '')}')">🔊</button></div>
        ${it.visual ? `<div class="q-visual">${it.visual}</div>` : ''}
        <div class="opts">${it.opts.map((o, i) =>
            `<button class="opt" data-i="${i}">${o}</button>`).join('')}</div>`;
    card.querySelectorAll('.opt').forEach(btn => {
        btn.addEventListener('click', () => {
            answers.push({ unit: it.unit, ok: parseInt(btn.dataset.i) === it.ans });
            idx++;
            if (idx < QUIZ.length) { speak('下一題'); renderItem(); }
            else finish();
        });
    });
    card.querySelector('.opt')?.focus({ preventScroll: true });  // 鍵盤/切換掃描可用
    speak(it.text);
}

async function finish() {
    renderDots();
    const correct = answers.filter(a => a.ok).length;
    // 按技能彙整（快篩每技能 1 題；前後測 2 題，全對才算通過該技能）
    const skills = [];
    answers.forEach((a, i) => {
        const q = QUIZ[i];
        let s = skills.find(x => x.unit === q.unit);
        if (!s) { s = { unit: q.unit, skill: q.skill, page: q.page, correct: 0, total: 0 }; skills.push(s); }
        s.total++; if (a.ok) s.correct++;
    });
    skills.forEach(s => s.pass = s.correct === s.total);
    // 建議起點＝最早未通過的技能；全通過 → 進階
    const recSkill = skills.find(s => !s.pass) || null;
    const rec = recSkill ? recSkill.unit : null;
    const recName = rec ? UNIT_NAMES[rec] : null;
    const recPage = recSkill ? recSkill.page : null;

    // 寫入學習紀錄（歷程可見；studentId 由 tracker 自動帶目前學生）
    try {
        await window.LearningTracker?.save({
            unit: 'assess', unitName: `🧭 起點評估${PHASE_LABEL ? '·' + PHASE_LABEL : ''}（建議：${recName || '進階應用'}）`, series: 'A',
            score: correct, total: answers.length, difficulty: 'normal',
            durationSec: Math.floor((Date.now() - startTs) / 1000),
        });
    } catch (e) {}

    let stu = null;
    try { stu = JSON.parse(localStorage.getItem('sp_currentStudent') || 'null'); } catch (e) {}

    // 建議起點寫入該學生（金隊長每日任務冷啟動會優先採用；全對＝已達進階則清除舊建議）
    try {
        if (stu && stu.id != null) {
            if (rec) localStorage.setItem('mt_startpoint_' + stu.id, rec);
            else     localStorage.removeItem('mt_startpoint_' + stu.id);
        }
    } catch (e) {}

    // 連續通過（自最基礎起）到哪一項技能
    let passStreak = 0;
    for (const s of skills) { if (s.pass) passStreak++; else break; }
    const passName = passStreak > 0 ? skills[passStreak - 1].skill : null;

    // 能力側寫地圖：F 系列一排、C 系列一排；建議起點圈出（前後測附 n/2 答對數）
    const segRow = (from, to) => skills.slice(from, to + 1).map(s => {
        const isRec = s.unit === rec, n = PP ? ` ${s.correct}/${s.total}` : '';
        const mark = s.pass ? `✅${n}` : (isRec ? `👈 起點${n}` : `❌${n}`);
        return `<span class="seg ${s.pass ? 'ok' : 'no'}${isRec ? ' rec' : ''}">${s.skill} <b>${mark}</b></span>`;
    }).join('');
    const skillMap = `
        <div class="skill-map" aria-label="能力側寫">
            <div class="sm-group">🔢 數學基礎（F1–F6）</div>
            <div class="sm-row">${segRow(0, 5)}</div>
            <div class="sm-group">💰 貨幣認知（C1–C6）</div>
            <div class="sm-row">${segRow(6, 11)}</div>
        </div>`;

    const detail = answers.map((a, i) =>
        `<tr><td>${QUIZ[i].skill}</td><td style="color:#94a3b8">${QUIZ[i].text}</td><td>${a.ok ? '✅ 通過' : '❌ 待加強'}</td></tr>`).join('');

    document.getElementById('card').innerHTML = `
        <div class="result-icon">${correct === answers.length ? '🏆' : '🧭'}</div>
        <h2 style="margin:8px 0">${PP ? PHASE_LABEL : '快篩'}完成！答對 ${correct} / ${answers.length} 題</h2>
        ${stu ? `<div class="sub">已記錄到「${stu.name}」的學習歷程${PHASE_LABEL ? '（' + PHASE_LABEL + '）' : ''}</div>` : '<div class="sub">（訪客模式：建議先到金隊長選擇學生再測）</div>'}
        <div class="rec-box">
            ${rec
                ? `${passName ? `<div class="pass-note">✅ 已穩定通過：基礎到「${passName}」</div>` : ''}金隊長建議的學習起點：<br><b>${recName}</b><br><span style="font-size:0.85em">從這裡開始，一步一步往上爬！</span>`
                : `基礎技能與貨幣認知都通過了！<br><b>建議直接挑戰「生活應用（A）」或「預算規劃（B）」單元</b> 🎉`}
        </div>
        ${skillMap}
        <div class="btn-row">
            ${rec ? `<a class="btn btn-main" href="html/${recPage}.html">▶ 前往 ${recName}</a>` : `<a class="btn btn-main" href="index.html">▶ 回主頁挑戰進階</a>`}
            <a class="btn btn-sub" href="index.html">回主頁</a>
            <button class="btn btn-sub" onclick="location.reload()">再測一次</button>
        </div>
        <details style="margin-top:12px;text-align:left;">
            <summary style="cursor:pointer;font-size:0.85em;color:#64748b;">📋 逐題明細（教師用）</summary>
            <table class="detail-table">${detail}</table>
        </details>`;
    speak(rec ? `快篩完成！建議從${recName}開始練習` : '太厲害了！基礎都通過了，可以挑戰進階單元！');
}

renderItem();
</script>
</body>
</html>

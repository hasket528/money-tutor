ck":{"perfect":"答對了！不裝懂，找懂的人來回答。","partial":"說出了重點！","failed":"記住：不會的問題不亂答，找懂的人幫忙。"},"image":"","image_label":"","frame_ref":"","audio":"mp3"}]},{"id":"angry_customer","name":"客人不高興","steps":[{"id":"say_sorry","shopkeeper_prompt":"（客人生氣：我等很久了！你們動作太慢了吧！）","task":"先道歉","options":["真的很抱歉讓您久等了","是你自己來的時間不對","急什麼","（跑走）"],"accepted_phrases":["真的很抱歉讓您久等了","很抱歉讓您久等了","對不起讓您久等"],"keywords":["久等"],"keywords_mode":"any","feedback":{"perfect":"說得很清楚！","partial":"說出了重點！","failed":"客人不高興先道歉。可以說：「真的很抱歉讓您久等了」"},"image":"","image_label":"","frame_ref":"","audio":""},{"id":"get_manager","shopkeeper_prompt":"（客人還是很生氣）","task":"請主管處理","options":["我請店長來協助您，請稍等","你再吵我報警","不然你要怎樣","（哭出來）"],"accepted_phrases":["我請店長來協助您，請稍等","請店長來協助您","我請店長來"],"keywords":["店長"],"keywords_mode":"any","feedback":{"perfect":"說得很清楚！","partial":"說出了重點！","failed":"處理不了就找主管。可以說：「我請店長來協助您，請稍等」"},"image":"","image_label":"","frame_ref":"","audio":""},{"id":"review","shopkeeper_prompt":"（想一想）遇到生氣的客人怎麼辦？","task":"說出方法","options":["先道歉，處理不了就請主管","跟客人吵回去","躲起來","裝聽不到"],"accepted_phrases":["先道歉，處理不了就請主管","先道歉請主管","道歉後請主管處理"],"keywords":["道歉","主管"],"keywords_mode":"any","feedback":{"perfect":"答對了！先道歉，處理不了就請主管。","partial":"說出了重點！","failed":"記住：先道歉安撫，處理不了請主管，不用自己硬扛。"},"image":"","image_label":"","frame_ref":"","audio":"mp3"}]}]}]}</script>
<script>
(function(){
  "use strict";
  const DATA = JSON.parse(document.getElementById('dlg-data').textContent);
  const LS_EDITS = 'jhc_editor_edits_v1';
  const LS_FIELDS = 'jhc_editor_fields_v1';
  const LS_UI = 'jhc_editor_ui_v1';

  // 欄位定義：key → 標籤 / 提示 / 預設顯示
  const FIELDS = [
    { k:'prompt',   label:'角色台詞',   hint:'', def:true },
    { k:'task',     label:'任務',       hint:'', def:true },
    { k:'correct',  label:'正確選項',   hint:'學生要說的標準答案', def:true },
    { k:'others',   label:'其他選項',   hint:'每行一項', def:true },
    { k:'accepted', label:'可接受說法', hint:'每行一項', def:true },
    { k:'keywords', label:'關鍵字',     hint:'每行一項；語音/打字模式用', def:true },
    { k:'feedback', label:'回饋',       hint:'完美／部分／失敗', def:true },
    { k:'meta',     label:'圖片/句框',  hint:'', def:false },
    { k:'audio',    label:'預錄狀態',   hint:'', def:false },
  ];

  const state = {
    part: 'all',
    sceneId: DATA.scenes[0] ? DATA.scenes[0].id : null,
    search: '',
    onlyChanged: false,
    fields: loadFields(),
    edits: loadEdits(),
  };

  function loadEdits(){ try{ return JSON.parse(localStorage.getItem(LS_EDITS)) || {}; }catch(e){ return {}; } }
  function saveEditsNow(){ try{ localStorage.setItem(LS_EDITS, JSON.stringify(state.edits)); }catch(e){} }
  let saveT=null; function saveEdits(){ clearTimeout(saveT); saveT=setTimeout(saveEditsNow, 300); }
  function loadFields(){ try{ const s=JSON.parse(localStorage.getItem(LS_FIELDS)); if(s) return s; }catch(e){}
    const o={}; FIELDS.forEach(f=>o[f.k]=f.def); return o; }
  function saveFields(){ try{ localStorage.setItem(LS_FIELDS, JSON.stringify(state.fields)); }catch(e){} }
  function loadUI(){ try{ return JSON.parse(localStorage.getItem(LS_UI))||{}; }catch(e){ return {}; } }
  function saveUI(){ try{ localStorage.setItem(LS_UI, JSON.stringify({part:state.part, sceneId:state.sceneId})); }catch(e){} }

  const sceneById = {}; DATA.scenes.forEach(s=>sceneById[s.id]=s);
  const EMOJI = {1:'🛒',2:'🍔',3:'🗺️',4:'🛡️',5:'🚆',6:'🎡',7:'💼'};

  // ── edits helpers ──────────────────────────────────────────
  function sEdit(id){ return state.edits[id] || (state.edits[id] = {}); }
  function stepEdits(sceneId){ const e=state.edits[sceneId]; return (e&&e.steps)||null; }
  function eqArr(a,b){ a=a||[]; b=b||[]; return a.length===b.length && a.every((v,i)=>v===b[i]); }

  function origStep(sceneId, key){ // key = sitId/stepId
    const sc=sceneById[sceneId]; if(!sc) return null;
    for(const sit of sc.situations){ for(const st of sit.steps){ if(sit.id+'/'+st.id===key) return {sit,st}; } }
    return null;
  }
  function countChanges(){
    let n=0;
    for(const sid in state.edits){ const e=state.edits[sid];
      if(e.character) n+=Object.keys(e.character).length;
      if(e.steps) for(const k in e.steps) n+=Object.keys(e.steps[k]).length;
    }
    return n;
  }
  function stepChangedCount(sceneId,key){ const s=stepEdits(sceneId); return s&&s[key]?Object.keys(s[key]).length:0; }

  // 設定某欄位的值（與原始比較，相同則移除）
  function setStepField(sceneId, key, field, newVal, origVal){
    const e=sEdit(sceneId); const steps=e.steps||(e.steps={});
    const rec=steps[key]||(steps[key]={});
    const same = Array.isArray(newVal) ? eqArr(newVal,origVal) : (newVal===(origVal||''));
    if(same){ delete rec[field]; if(!Object.keys(rec).length) delete steps[key];
      if(e.steps && !Object.keys(e.steps).length) delete e.steps;
      if(!e.character && !e.steps) delete state.edits[sceneId]; }
    else { rec[field]=newVal; }
    saveEdits(); refreshCounts();
  }
  function setCharField(sceneId, field, newVal, origVal){
    const e=sEdit(sceneId); const ch=e.character||(e.character={});
    if((newVal||'')===(origVal||'')){ delete ch[field]; if(!Object.keys(ch).length) delete e.character;
      if(!e.character && !e.steps) delete state.edits[sceneId]; }
    else ch[field]=newVal;
    saveEdits(); refreshCounts();
  }
  function curStepVal(sceneId,key,field,orig){ const s=stepEdits(sceneId); if(s&&s[key]&&field in s[key]) return s[key][field]; return orig; }
  function curCharVal(sceneId,field,orig){ const e=state.edits[sceneId]; if(e&&e.character&&field in e.character) return e.character[field]; return orig; }

  // ── UI 構件 ────────────────────────────────────────────────
  const el=(t,c,txt)=>{ const n=document.createElement(t); if(c)n.className=c; if(txt!=null)n.textContent=txt; return n; };
  function autoGrow(ta){ ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight, 420)+'px'; }

  function fieldTA(sceneId, key, field, labelHTML, value, isArr, opts){
    opts=opts||{};
    const wrap=el('div','field'+(opts.correct?' ':'')); wrap.dataset.field=field;
    const lab=el('div','flabel'+(opts.correct?' correct':'')); lab.innerHTML=labelHTML; wrap.appendChild(lab);
    let input;
    if(opts.single){ input=el(opts.correct?'input':'input','fin'+(opts.correct?' correct':'')); input.type='text'; input.value=value||''; }
    else { input=el('textarea'); input.value=value||''; }
    wrap.appendChild(input);
    const orig = isArr ? (opts.orig||[]) : (opts.orig||'');
    const mark=()=>{ const cur = isArr ? linesArr(input.value) : input.value;
      const dirty = isArr ? !eqArr(cur,orig) : (cur!==orig);
      wrap.classList.toggle('dirty', dirty); };
    input.addEventListener('input', ()=>{
      if(!opts.single) autoGrow(input);
      const val = isArr ? linesArr(input.value) : input.value;
      opts.onset(val); mark();
      const card=wrap.closest('.step'); if(card) markStepCard(card, sceneId, opts.stepKey);
    });
    mark(); if(!opts.single) requestAnimationFrame(()=>autoGrow(input));
    return wrap;
  }
  const linesArr = s => String(s||'').split('\n').map(x=>x.trim()).filter(Boolean);
  const arrLines = a => (a||[]).join('\n');

  function markStepCard(card, sceneId, key){
    card.classList.toggle('changed', stepChangedCount(sceneId,key)>0);
  }

  // ── 步驟卡 ─────────────────────────────────────────────────
  function renderStep(sceneId, sit, st, no){
    const key=sit.id+'/'+st.id;
    const card=el('div','step'); card.dataset.key=key;
    if(stepChangedCount(sceneId,key)>0) card.classList.add('changed');
    const top=el('div','step-top');
    top.appendChild(el('span','step-no','步驟 '+no));
    top.appendChild(el('span','step-id',st.id));
    const chip=el('span','step-chip','● 已修改'); top.appendChild(chip);
    card.appendChild(top);

    const F=state.fields;
    // 台詞
    if(F.prompt) card.appendChild(fieldTA(sceneId,key,'shopkeeper_prompt','角色台詞',
      curStepVal(sceneId,key,'shopkeeper_prompt',st.shopkeeper_prompt), false,
      {orig:st.shopkeeper_prompt, stepKey:key, onset:v=>setStepField(sceneId,key,'shopkeeper_prompt',v,st.shopkeeper_prompt)}));
    // 任務
    if(F.task) card.appendChild(fieldTA(sceneId,key,'task','任務',
      curStepVal(sceneId,key,'task',st.task), false,
      {single:true, orig:st.task, stepKey:key, onset:v=>setStepField(sceneId,key,'task',v,st.task)}));
    // 正確選項（options[0]）
    if(F.correct){ const origC = st.options[0]||'';
      card.appendChild(fieldTA(sceneId,key,'correct','✅ 正確選項 <span class="hint">學生標準答案</span>',
        (curStepVal(sceneId,key,'options',st.options))[0]||'', false,
        {single:true, correct:true, orig:origC, stepKey:key, onset:v=>{
          const cur=(curStepVal(sceneId,key,'options',st.options)).slice(); cur[0]=v;
          setStepField(sceneId,key,'options',cur,st.options);
        }})); }
    // 其他選項（options[1..]）
    if(F.others){ const origO = st.options.slice(1);
      card.appendChild(fieldTA(sceneId,key,'others','其他選項 <span class="hint">每行一項</span>',
        arrLines((curStepVal(sceneId,key,'options',st.options)).slice(1)), true,
        {orig:origO, stepKey:key, onset:v=>{
          const cur=(curStepVal(sceneId,key,'options',st.options)).slice(); const head=cur[0]||'';
          setStepField(sceneId,key,'options',[head].concat(v),st.options);
        }})); }
    // 可接受說法
    if(F.accepted) card.appendChild(fieldTA(sceneId,key,'accepted','可接受說法 <span class="hint">每行一項</span>',
      arrLines(curStepVal(sceneId,key,'accepted_phrases',st.accepted_phrases)), true,
      {orig:st.accepted_phrases, stepKey:key, onset:v=>setStepField(sceneId,key,'accepted_phrases',v,st.accepted_phrases)}));
    // 關鍵字 + 模式
    if(F.keywords){
      const kf=fieldTA(sceneId,key,'keywords','關鍵字 <span class="hint">每行一項</span>',
        arrLines(curStepVal(sceneId,key,'keywords',st.keywords)), true,
        {orig:st.keywords, stepKey:key, onset:v=>setStepField(sceneId,key,'keywords',v,st.keywords)});
      // 模式
      const modeWrap=el('label','chk kwmode'); modeWrap.style.marginTop='4px';
      const sel=el('select'); ['any','all'].forEach(m=>{ const o=el('option',null,m==='any'?'符合任一 (any)':'全部符合 (all)'); o.value=m; sel.appendChild(o); });
      sel.value=curStepVal(sceneId,key,'keywords_mode',st.keywords_mode||'any');
      sel.addEventListener('change',()=>{ setStepField(sceneId,key,'keywords_mode',sel.value,st.keywords_mode||'any');
        const c=kf.closest('.step'); if(c) markStepCard(c,sceneId,key); });
      const ml=el('span',null,'比對模式：'); ml.style.fontSize='.72rem'; ml.style.color='var(--muted)';
      modeWrap.appendChild(ml); modeWrap.appendChild(sel); kf.appendChild(modeWrap);
      card.appendChild(kf);
    }
    // 回饋
    if(F.feedback){ const wrap=el('div','field'); wrap.appendChild(el('div','flabel','回饋語'));
      const grid=el('div','fb-grid'); const fb=st.feedback||{};
      [['perfect','完美'],['partial','部分'],['failed','失敗']].forEach(([fk,lab])=>{
        const cur=curStepVal(sceneId,key,'feedback_'+fk, fb[fk]||'');
        const f=fieldTA(sceneId,key,'feedback_'+fk, lab, cur, false,
          {single:true, orig:fb[fk]||'', stepKey:key, onset:v=>setStepField(sceneId,key,'feedback_'+fk,v,fb[fk]||'')});
        grid.appendChild(f);
      });
      wrap.appendChild(grid); card.appendChild(wrap);
    }
    // meta 圖片/句框
    if(F.meta){ const wrap=el('div','field'); wrap.appendChild(el('div','flabel','圖片／句框'));
      const info=el('div',null); info.style.fontSize='.8rem'; info.style.color='var(--muted)';
      info.textContent='圖片：'+(st.image||'—')+(st.image_label?('（'+st.image_label+'）'):'')+'　句框：'+(st.frame_ref||'—');
      wrap.appendChild(info); card.appendChild(wrap); }
    // audio
    if(F.audio){ const a=el('div','step-audio','🔊 預錄口白：'+(st.audio?st.audio:'無（即時 TTS）')); card.appendChild(a); }

    return card;
  }

  // ── 場景卡 ─────────────────────────────────────────────────
  function renderScene(sc, opts){
    opts=opts||{};
    const head=el('div','scene-head'+(opts.open!==false?' open':''));
    const top=el('div','scene-top');
    top.appendChild(el('div','scene-emoji',EMOJI[sc.part]||'💬'));
    const info=el('div'); info.style.flex='1';
    const nm=el('div'); nm.innerHTML='<span class="scene-name">'+esc(sc.name)+'</span><span class="scene-id">'+esc(sc.id)+'</span>';
    info.appendChild(nm);
    const ch=sc.character||{};
    const role=el('div','scene-role'); role.innerHTML='角色：<b>'+esc(ch.name||'（見開場白）')+'</b>'+(ch.role?('（'+esc(ch.role)+'）'):'')
      +'　·　聲音：'+esc(ch.geminiVoice||ch.browserVoice||'—')+(ch.sceneVoices&&ch.sceneVoices.length?('＋情境內 '+esc(ch.sceneVoices.join('、'))):'');
    info.appendChild(role);
    top.appendChild(info);
    top.appendChild(el('div','scene-caret','▾'));
    top.addEventListener('click', ()=>head.classList.toggle('open'));
    head.appendChild(top);

    const body=el('div','scene-body');
    // 角色設定（可編輯）
    const cbox=el('div','situation');
    const clab=el('div','sit-label'); clab.innerHTML='<span class="sit-bar" style="background:var(--correct)"></span><span class="sit-name">角色設定</span>';
    cbox.appendChild(clab);
    const cCard=el('div','step');
    cCard.appendChild(charField(sc.id,'name','角色名', ch.name));
    cCard.appendChild(charField(sc.id,'role','身分／角色', ch.role));
    cCard.appendChild(charField(sc.id,'intro','開場白', ch.intro, true));
    cCard.appendChild(charField(sc.id,'persona','性格設定', ch.persona, true));
    const vrow=el('div','row2');
    vrow.appendChild(charField(sc.id,'browserVoice','瀏覽器語音', ch.browserVoice, false, true));
    vrow.appendChild(charField(sc.id,'geminiVoice','Gemini 語音', ch.geminiVoice, false, true));
    cCard.appendChild(vrow);
    cbox.appendChild(cCard); body.appendChild(cbox);

    // 各情境步驟
    sc.situations.forEach(sit=>{
      const filtered = sit.steps.filter(st=>{
        if(state.onlyChanged && stepChangedCount(sc.id, sit.id+'/'+st.id)===0) return false;
        return true;
      });
      if(!filtered.length) return;
      const sbox=el('div','situation');
      const lab=el('div','sit-label');
      lab.innerHTML='<span class="sit-bar"></span><span class="sit-name">'+esc(sit.name)+'</span><span class="sit-id">'+esc(sit.id)+'</span><span class="sit-count">'+filtered.length+' 步</span>';
      sbox.appendChild(lab);
      sit.steps.forEach((st,i)=>{ if(filtered.indexOf(st)<0) return; sbox.appendChild(renderStep(sc.id, sit, st, i+1)); });
      body.appendChild(sbox);
    });
    if(!body.querySelector('.situation:nth-child(2)') && state.onlyChanged){
      // 只有角色設定、沒有已改步驟
    }
    head.appendChild(body);
    return head;
  }
  function charField(sceneId, field, label, value, multi, small){
    const cur=curCharVal(sceneId, field, value||'');
    const wrap=el('div','field'); if(small) wrap.style.minWidth='150px';
    const lab=el('div','flabel'); lab.textContent=label; wrap.appendChild(lab);
    const input = multi ? el('textarea') : Object.assign(el('input','fin'),{type:'text'});
    input.value=cur; wrap.appendChild(input);
    const orig=value||'';
    const mark=()=>wrap.classList.toggle('dirty', input.value!==orig);
    input.addEventListener('input',()=>{ if(multi) autoGrow(input); setCharField(sceneId,field,input.value,orig); mark(); });
    mark(); if(multi) requestAnimationFrame(()=>autoGrow(input));
    return wrap;
  }

  // ── 搜尋結果 ───────────────────────────────────────────────
  function searchRender(term){
    term=term.toLowerCase();
    const wrap=document.getElementById('wrap'); wrap.innerHTML='';
    let hits=0;
    for(const sc of DATA.scenes){
      if(state.part!=='all' && String(sc.part)!==state.part) continue;
      const matchSteps=[];
      for(const sit of sc.situations) for(const st of sit.steps){
        const hay=[st.shopkeeper_prompt, st.task, (st.options||[]).join(' '), (st.keywords||[]).join(' '), (st.accepted_phrases||[]).join(' ')].join(' ').toLowerCase();
        if(hay.indexOf(term)>=0) matchSteps.push({sit,st});
      }
      if(!matchSteps.length) continue;
      const scCopy=Object.assign({}, sc, {situations: groupBySit(matchSteps)});
      wrap.appendChild(renderScene(scCopy,{open:true}));
      hits+=matchSteps.length;
      if(hits>250) break;
    }
    if(!hits){ wrap.appendChild(emptyBox('🔍','找不到符合「'+esc(term)+'」的步驟','換個關鍵字，或清空搜尋回到場景檢視。')); }
  }
  function groupBySit(pairs){
    const map=new Map();
    pairs.forEach(({sit,st})=>{ if(!map.has(sit.id)) map.set(sit.id,{id:sit.id,name:sit.name,steps:[]}); map.get(sit.id).steps.push(st); });
    return [...map.values()];
  }
  function emptyBox(big,title,sub){ const d=el('div','empty'); d.innerHTML='<div class="big">'+big+'</div><div style="font-weight:700;margin-bottom:6px">'+title+'</div><div>'+sub+'</div>'; return d; }

  // ── 主渲染 ─────────────────────────────────────────────────
  function render(){
    const wrap=document.getElementById('wrap');
    if(state.search.trim()){ searchRender(state.search.trim()); return; }
    wrap.innerHTML='';
    const sc=sceneById[state.sceneId];
    if(!sc){ wrap.appendChild(emptyBox('📁','請選擇一個場景','用上方的「部分」與「場景」選單挑選要編輯的場景。')); return; }
    wrap.appendChild(renderScene(sc,{open:true}));
    if(state.onlyChanged && !wrap.querySelector('.step.changed')){
      wrap.appendChild(emptyBox('✓','這個場景目前沒有已修改的步驟','取消「只看已改」可看到全部步驟。'));
    }
  }

  // ── 選單 / 控制 ────────────────────────────────────────────
  function buildPartSelect(){
    const sel=document.getElementById('partSelect'); sel.innerHTML='';
    const add=(v,l)=>{ const o=el('option',null,l); o.value=v; sel.appendChild(o); };
    add('all','全部部分');
    Object.keys(DATA.parts).sort((a,b)=>a-b).forEach(p=>add(String(p),'第'+p+'部分・'+DATA.parts[p]));
    sel.value=state.part;
    sel.onchange=()=>{ state.part=sel.value;
      if(state.part!=='all'){ const first=DATA.scenes.find(s=>String(s.part)===state.part); if(first) state.sceneId=first.id; }
      buildSceneSelect(); saveUI(); render(); };
  }
  function buildSceneSelect(){
    const sel=document.getElementById('sceneSelect'); sel.innerHTML='';
    DATA.scenes.filter(s=>state.part==='all'||String(s.part)===state.part).forEach(s=>{
      const o=el('option',null,'第'+s.part+'部分 · '+s.name); o.value=s.id;
      if(stepEditsHasAny(s.id)) o.textContent='● '+o.textContent;
      sel.appendChild(o);
    });
    if([...sel.options].some(o=>o.value===state.sceneId)) sel.value=state.sceneId;
    else if(sel.options.length){ state.sceneId=sel.options[0].value; sel.value=state.sceneId; }
  }
  function stepEditsHasAny(sceneId){ const e=state.edits[sceneId]; return !!(e&&(e.character||e.steps)); }

  function buildFieldbar(){
    const bar=document.getElementById('fieldbar'); bar.innerHTML='';
    bar.appendChild(el('span','lead','顯示欄位'));
    FIELDS.forEach(f=>{
      const l=el('label','chk'); const cb=el('input'); cb.type='checkbox'; cb.checked=!!state.fields[f.k];
      cb.addEventListener('change',()=>{ state.fields[f.k]=cb.checked; saveFields(); render(); });
      l.appendChild(cb); l.appendChild(document.createTextNode(f.label)); bar.appendChild(l);
    });
    const preset=el('div','preset');
    const p1=el('button','btn ghost small','只看台詞＋正確選項');
    p1.addEventListener('click',()=>{ FIELDS.forEach(f=>state.fields[f.k]=(f.k==='prompt'||f.k==='correct')); saveFields(); buildFieldbar(); render(); });
    const p2=el('button','btn ghost small','全部欄位');
    p2.addEventListener('click',()=>{ FIELDS.forEach(f=>state.fields[f.k]=true); saveFields(); buildFieldbar(); render(); });
    preset.appendChild(p1); preset.appendChild(p2); bar.appendChild(preset);
  }

  function refreshCounts(){
    const n=countChanges();
    const badge=document.getElementById('changeBadge');
    badge.textContent = n? (n+' 處變更') : '尚無變更';
    badge.classList.toggle('on', n>0);
    document.getElementById('btnExport').disabled = n===0;
    document.getElementById('btnCopy').disabled = n===0;
    document.getElementById('counts').innerHTML =
      '場景 <b>'+DATA.meta.scenes+'</b>　情境 <b>'+DATA.meta.situations+'</b>　步驟 <b>'+DATA.meta.steps+'</b>';
  }

  // ── 匯出 ───────────────────────────────────────────────────
  function buildExport(){
    const out={ tool:'金好聊對話內容編輯器', exportedAt:new Date().toISOString(), baseData:DATA.meta.exportedAt, scenes:{} };
    for(const sid in state.edits){ const e=state.edits[sid]; const o={};
      if(e.character) o.character=e.character;
      if(e.steps){ o.steps={}; for(const key in e.steps){
        const rec=e.steps[key]; const outRec={};
        // 合併 feedback_* 回 feedback 物件
        const fb={};
        for(const f in rec){
          if(f.indexOf('feedback_')===0) fb[f.slice(9)]=rec[f];
          else outRec[f]=rec[f];
        }
        if(Object.keys(fb).length) outRec.feedback=fb;
        o.steps[key]=outRec;
      } }
      out.scenes[sid]=o;
    }
    return out;
  }
  function download(filename, text){
    const blob=new Blob([text],{type:'application/json;charset=utf-8'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename;
    document.body.appendChild(a); a.click(); setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); },100);
  }
  function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
    clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),1800); }

  document.getElementById('btnExport').addEventListener('click',()=>{
    const stamp=new Date().toISOString().slice(0,16).replace(/[:T]/g,'').replace(/-/g,'');
    download('對話變更_'+stamp+'.json', JSON.stringify(buildExport(),null,2)); toast('已下載變更檔');
  });
  async function doCopy(){
    const txt=JSON.stringify(buildExport(),null,2);
    try{ await navigator.clipboard.writeText(txt); toast('已複製變更 JSON，可貼給我'); }
    catch(e){ download('對話變更.json',txt); toast('無法複製，改為下載'); }
  }
  document.getElementById('btnCopy').addEventListener('click', doCopy);

  // ── 資料管理面板（匯入 / 暫存點 / 交出 / 清除）──────────────
  const LS_SNAPS='jhc_editor_snapshots_v1';
  const moreModal=document.getElementById('moreModal');
  const loadSnaps=()=>{ try{ return JSON.parse(localStorage.getItem(LS_SNAPS))||[]; }catch(e){ return []; } };
  const saveSnaps=a=>{ try{ localStorage.setItem(LS_SNAPS, JSON.stringify(a)); }catch(e){} };
  const fmtTime=iso=>{ try{ return new Date(iso).toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}); }catch(e){ return ''; } };
  const sectionTitle=t=>el('div','sec-title',t);
  const hintP=t=>el('p','hintp',t);

  function renderMore(){
    const n=countChanges(); const body=document.getElementById('moreBody'); body.innerHTML='';
    const info=el('p'); info.innerHTML='目前 <b>'+n+'</b> 處變更，已<b>自動暫存</b>在這個瀏覽器（關掉重開仍在）。基準資料：'+esc(DATA.meta.exportedAt)+'。';
    body.appendChild(info);

    body.appendChild(sectionTitle('匯入變更'));
    const impRow=el('div','row'); const impBtn=el('button','btn primary','選擇檔案匯入…');
    impBtn.addEventListener('click',()=>document.getElementById('fileImport').click());
    impRow.appendChild(impBtn); body.appendChild(impRow);
    body.appendChild(hintP('載入之前「匯出變更／暫存」的 JSON 檔（可與目前變更合併或取代）。換手機／電腦接續編輯就用這個。'));

    body.appendChild(sectionTitle('暫存點（存在這個瀏覽器）'));
    const snapRow=el('div','row'); const saveBtn=el('button','btn','＋ 存成暫存點');
    saveBtn.addEventListener('click',saveSnapshot); snapRow.appendChild(saveBtn); body.appendChild(snapRow);
    const list=el('div','snap-list'); const snaps=loadSnaps();
    if(!snaps.length) list.appendChild(el('div','snap-empty','尚無暫存點。改到一段落可先存一版，之後隨時還原。'));
    else snaps.slice().reverse().forEach(s=>list.appendChild(snapRowEl(s)));
    body.appendChild(list);

    body.appendChild(sectionTitle('交給我 / 其他'));
    const r2=el('div','row');
    const cp=el('button','btn','複製變更'); cp.addEventListener('click',()=>{ moreModal.hidden=true; doCopy(); });
    const ex=el('button','btn','匯出全部'); ex.addEventListener('click',()=>{ download('對話全部資料.json', JSON.stringify({ base:DATA.meta, edits:buildExport() },null,2)); toast('已下載全部資料'); });
    r2.appendChild(cp); r2.appendChild(ex); body.appendChild(r2);
    const r3=el('div','row'); const cl=el('button','btn danger','清除所有變更'); cl.addEventListener('click',clearAll);
    r3.appendChild(cl); body.appendChild(r3);
  }
  function snapRowEl(s){
    const row=el('div','snap-row'); const meta=el('div','snap-meta');
    meta.appendChild(el('div','snap-name',s.name));
    meta.appendChild(el('div','snap-sub', s.count+' 處變更 · '+fmtTime(s.at)));
    row.appendChild(meta);
    const rb=el('button','btn','還原'); rb.addEventListener('click',()=>restoreSnap(s.id));
    const db=el('button','btn ghost','刪除'); db.addEventListener('click',()=>{ if(confirm('刪除暫存點「'+s.name+'」？')) { saveSnaps(loadSnaps().filter(x=>x.id!==s.id)); renderMore(); } });
    row.appendChild(rb); row.appendChild(db); return row;
  }
  function saveSnapshot(){
    const n=countChanges(); if(!n){ toast('目前沒有變更可暫存'); return; }
    const def='暫存 '+fmtTime(new Date().toISOString());
    const name=prompt('暫存點名稱：', def); if(name===null) return;
    const snaps=loadSnaps();
    snaps.push({ id:Date.now(), name:(name||def), at:new Date().toISOString(), count:n, edits:JSON.parse(JSON.stringify(state.edits)) });
    while(snaps.length>12) snaps.shift();
    saveSnaps(snaps); renderMore(); toast('已存暫存點');
  }
  function restoreSnap(id){
    const s=loadSnaps().find(x=>x.id===id); if(!s) return;
    if(!confirm('還原暫存點「'+s.name+'」？\n會取代目前的 '+countChanges()+' 處變更。')) return;
    state.edits=JSON.parse(JSON.stringify(s.edits)); saveEditsNow(); refreshCounts(); buildSceneSelect(); render(); renderMore(); toast('已還原暫存點');
  }
  function clearAll(){
    if(confirm('確定要清除全部 '+countChanges()+' 處變更嗎？此動作無法復原。（暫存點不受影響）')){
      state.edits={}; saveEditsNow(); refreshCounts(); buildSceneSelect(); render(); renderMore(); toast('已清除所有變更');
    }
  }
  function applyDiff(diff, replace){
    if(replace) state.edits={};
    let skipped=0;
    for(const sid in diff.scenes){
      const sc=sceneById[sid]; const e=diff.scenes[sid]||{};
      if(!sc){ skipped++; continue; }
      if(e.character) for(const f in e.character){ const orig=(sc.character && f in sc.character)?sc.character[f]:''; setCharField(sid,f,e.character[f],orig); }
      if(e.steps) for(const key in e.steps){
        const o=origStep(sid,key); if(!o){ skipped++; continue; }
        const rec=e.steps[key];
        for(const f in rec){
          if(f==='feedback'){ const fb=rec.feedback||{}, ofb=o.st.feedback||{}; for(const fk in fb) setStepField(sid,key,'feedback_'+fk, fb[fk], ofb[fk]||''); }
          else setStepField(sid,key,f, rec[f], o.st[f]);
        }
      }
    }
    saveEditsNow(); refreshCounts(); buildSceneSelect(); render(); renderMore();
    toast('匯入完成，目前共 '+countChanges()+' 處變更'+(skipped?('（略過 '+skipped+' 筆找不到的）'):''));
  }
  document.getElementById('fileImport').addEventListener('change', function(){
    const f=this.files && this.files[0]; const inp=this;
    if(!f){ return; }
    const rd=new FileReader();
    rd.onload=()=>{ inp.value='';
      let obj; try{ obj=JSON.parse(rd.result); }catch(e){ toast('這不是有效的 JSON 檔'); return; }
      const diff = (obj && obj.scenes) ? obj : (obj && obj.edits && obj.edits.scenes ? obj.edits : null);
      if(!diff || !diff.scenes){ toast('檔案格式不符，需要匯出的變更檔'); return; }
      let replace=false;
      if(countChanges()>0){ replace = !confirm('目前已有 '+countChanges()+' 處變更。\n\n按「確定」＝與匯入內容『合併』\n按「取消」＝以匯入內容『取代』（清掉目前變更）'); }
      applyDiff(diff, replace);
    };
    rd.readAsText(f);
  });
  document.getElementById('btnMore').addEventListener('click',()=>{ renderMore(); moreModal.hidden=false; });
  document.getElementById('btnCloseMore').addEventListener('click',()=>moreModal.hidden=true);
  moreModal.addEventListener('click',e=>{ if(e.target===moreModal) moreModal.hidden=true; });

  // controls wiring
  document.getElementById('sceneSelect').addEventListener('change',e=>{ state.sceneId=e.target.value; saveUI(); render(); });
  let searchT=null;
  document.getElementById('search').addEventListener('input',e=>{ state.search=e.target.value; clearTimeout(searchT); searchT=setTimeout(render,180); });
  document.getElementById('onlyChanged').addEventListener('change',e=>{ state.onlyChanged=e.target.checked; render(); });
  document.getElementById('btnFields').addEventListener('click',e=>{
    const bar=document.getElementById('fieldbar'); const show=bar.hidden; bar.hidden=!show;
    e.target.setAttribute('aria-expanded', String(show)); e.target.textContent = show?'欄位 ▴':'欄位 ▾';
  });
  const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  // init
  (function init(){
    const ui=loadUI(); if(ui.part) state.part=ui.part; if(ui.sceneId && sceneById[ui.sceneId]) state.sceneId=ui.sceneId;
    buildPartSelect(); buildSceneSelect(); buildFieldbar(); refreshCounts(); render();
    // 手機：預設收合欄位列，避免頂部佔滿畫面
    if(window.matchMedia('(max-width:640px)').matches){
      const bar=document.getElementById('fieldbar'); bar.hidden=true;
      const btn=document.getElementById('btnFields'); btn.textContent='欄位 ▾'; btn.setAttribute('aria-expanded','false');
    }
  })();
})();
</script>
</body></html>

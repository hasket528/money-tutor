<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>汽水倒倒樂</title>
  <link rel="stylesheet" href="../../css/ai-theme.css">
  <link rel="stylesheet" href="../css/games-base.css">
  <link rel="stylesheet" href="pour.css">
</head>
<body class="game-body">

  <div id="pour-stage">
    <div id="pour-info-bar">
      <span id="pour-soda-label"></span>
      <span id="pour-round-label"></span>
    </div>

    <div id="pour-cups-row">
      <!-- Generated by JS -->
    </div>

    <div id="pour-controls">
      <button id="pour-btn" disabled>
        <span class="pour-btn-icon">🫗</span>
        <span id="pour-btn-text">按住倒入</span>
      </button>
    </div>

    <div id="pour-hint"></div>

    <!-- Pitcher: absolutely positioned in stage, z-index on top of cups -->
    <div id="pour-bottle-container"></div>
  </div>

  <script src="../../js/audio-unlocker.js"></script>
  <script src="../js/game-engine.js"></script>
  <script src="../js/game-ui.js"></script>
  <script src="../js/game-audio.js"></script>
  <script src="pour.js"></script>
</body>
</html>
